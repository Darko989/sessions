name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Build .icns from committed icon
        run: |
          mkdir -p build/icon.iconset
          for s in 16 32 64 128 256 512; do
            sips -z $s $s build/icon.png --out build/icon.iconset/icon_${s}x${s}.png
            sips -z $((s*2)) $((s*2)) build/icon.png --out build/icon.iconset/icon_${s}x${s}@2x.png
          done
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y imagemagick rpm
          mkdir -p build/icons
          for s in 16 24 32 48 64 128 256 512; do
            convert build/icon.png -resize ${s}x${s} build/icons/${s}x${s}.png 2>/dev/null || true
          done

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always

  # ── Windows ────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Convert icon to .ico
        shell: pwsh
        run: |
          # build/icon.ico is already committed — nothing to do
          if (!(Test-Path "build/icon.ico")) {
            Write-Error "build/icon.ico not found"
            exit 1
          }

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
