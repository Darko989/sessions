appId: com.branchless.app
productName: Branchless
copyright: Copyright © 2024

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierrc.yaml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.*}'
  - '!{tailwind,postcss}.config.*'

npmRebuild: false
afterPack: build/afterPack.js

extraResources:
  - from: resources/icon.png
    to: icon.png

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
    - target: zip
      arch:
        - x64
        - arm64
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false

dmg:
  title: Branchless
  icon: build/icon.icns
  background: build/background.tiff
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 185
      type: file
    - x: 390
      y: 185
      type: link
      path: /Applications

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon: build/icon.ico
  executableName: branchless
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon: build/icons
  category: Development
  executableName: branchless
  desktop:
    Name: Branchless
    Comment: Work on multiple tasks in parallel without branch switching
    Categories: Development;IDE;
    StartupWMClass: branchless
    MimeType: ""
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64

# ── Auto-update via GitHub Releases ───────────────────────────────────────────
publish:
  provider: github
  owner: Darko989
  repo: sessions
  releaseType: release
